<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Manu Blog Editor</title>
        <style>
            * { box-sizing: border-box; }
            body {
                width: 280px;
                padding: 16px;
                font-family: -apple-system, BlinkMacSystemFont, sans-serif;
                font-size: 13px;
                background: #141619;
                color: #f8f9fc;
                margin: 0;
            }
            h3 { margin: 0 0 16px; font-size: 15px; font-weight: 600; }
            label {
                display: block;
                font-size: 11px;
                font-weight: 600;
                margin-top: 12px;
                color: #d6d9e0;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }
            input {
                width: 100%;
                padding: 6px 8px;
                font-size: 12px;
                margin-top: 4px;
                background: #23262e;
                border: 1px solid #393e4b;
                border-radius: 4px;
                color: #f8f9fc;
                outline: none;
                font-family: inherit;
            }
            input:focus { border-color: #445fcf; }
            .hint {
                font-size: 10px;
                color: #888;
                margin-top: 4px;
            }
            .hint strong { color: #d6d9e0; }
            hr {
                border: none;
                border-top: 1px solid #23262e;
                margin: 16px 0 0;
            }
            .btn-row {
                margin-top: 12px;
                display: flex;
                gap: 8px;
            }
            button {
                flex: 1;
                padding: 8px;
                font-size: 12px;
                cursor: pointer;
                background: #23262e;
                border: 1px solid #393e4b;
                border-radius: 4px;
                color: #f8f9fc;
                font-family: inherit;
            }
            button:hover:not(:disabled) { background: #393e4b; }
            button:disabled { opacity: 0.5; cursor: default; }
            #status {
                margin-top: 8px;
                font-size: 11px;
                color: #4ade80;
                min-height: 16px;
                word-break: break-all;
            }
            #status.error { color: #f87171; }
        </style>
    </head>
    <body>
        <h3>Manu Blog Editor</h3>

        <label>GitHub Token</label>
        <input type="password" id="token" placeholder="ghp_…" autocomplete="off" />
        <div class="hint">Needs <strong>Contents: read &amp; write</strong> (fine-grained) or <strong>repo</strong> scope (classic)</div>

        <label>Owner</label>
        <input type="text" id="owner" />

        <label>Repository</label>
        <input type="text" id="repo" />

        <label>Branch</label>
        <input type="text" id="branch" />

        <label>Site URL</label>
        <input type="text" id="siteUrl" />

        <hr />

        <div class="btn-row">
            <button id="save-btn">Save Settings</button>
            <button id="sync-btn">Sync Assets</button>
        </div>
        <div id="status"></div>

        <script src="popup.js"></script>
    </body>
</html>
